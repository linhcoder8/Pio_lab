name: Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pio_lab
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pio_lab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pio_lab"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: pio_lab
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pio_lab_test
          # Mock keys cho unit tests (integration tests sẽ skip nếu không có real key)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'mock-key' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'mock-key' }}
        run: |
          pytest tests/unit/ -v --cov=pio_lab --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pio_lab
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pio_lab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pio_lab"
          --health-interval=10s

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: pio_lab
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pio_lab_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          pytest tests/integration/ -v -m integration
