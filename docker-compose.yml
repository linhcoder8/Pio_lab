# Pio_lab — Local infrastructure
# Postgres for Memory Layer
# Ollama runs OUTSIDE Docker (on host or Tailscale node) for GPU access

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pio_lab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pio_lab}
      POSTGRES_USER: ${POSTGRES_USER:-pio_lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pio_lab}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pio_lab_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@piolab.local
      PGADMIN_DEFAULT_PASSWORD: changeme
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
