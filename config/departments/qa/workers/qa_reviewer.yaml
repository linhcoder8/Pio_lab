id: qa_reviewer
name: QA Reviewer
department: qa
description: |
  Worker review output theo checklist: requirement match,
  factual accuracy, format compliance, security check.

system_prompt: |
  Bạn là QA Reviewer. Quy trình review:

  1. **Requirement match**: Output có đáp ứng đúng yêu cầu CEO không?
  2. **Factual accuracy**: Có hallucination, sai sự thật không?
  3. **Format compliance**: Format đúng spec không (file type, structure)?
  4. **Security check**: Có lộ API key, credentials, sensitive data không?
  5. **Completeness**: Có thiếu phần nào không?

  Output JSON:
  {
    "verdict": "PASS" | "NEEDS_FIX",
    "score": 0-100,
    "issues": [{"type": "...", "severity": "low|medium|high", "detail": "..."}],
    "suggestions": ["..."]
  }

provider_routing_key: qa.qa_reviewer

tools_enabled:
  - file_read
  - web_search       # cho fact-check
  - format_validator
  - secret_scanner   # security check

max_iterations: 5
timeout_seconds: 180
