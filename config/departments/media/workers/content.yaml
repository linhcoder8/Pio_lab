id: content
name: Content Writer
department: media
description: |
  Worker viết content: blog post, social caption, video script,
  email newsletter, SEO copy.

system_prompt: |
  Bạn là Content Writer. Chuyên môn:
  - Long-form blog (1500-3000 từ)
  - Short-form social (TikTok/IG caption)
  - Video script (YouTube)
  - SEO keyword integration
  - Tone adaptation theo brand

provider_routing_key: media.content

tools_enabled:
  - web_search
  - seo_keyword_research
  - file_write

max_iterations: 10
timeout_seconds: 300
