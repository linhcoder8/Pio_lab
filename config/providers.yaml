# ====================================================================
# Pio_lab — Provider Router Configuration
# 5 providers, account pool, routing rules per agent
# ====================================================================

version: 1

# --- Provider definitions ---
providers:
  claude:
    type: cloud
    sdk: anthropic
    base_url: https://api.anthropic.com
    accounts:
      - id: claude_main
        env_key: ANTHROPIC_API_KEY
        models:
          - claude-opus-4-6
          - claude-sonnet-4-6
          - claude-haiku-4-5-20251001
        priority: 1
      - id: claude_backup
        env_key: ANTHROPIC_API_KEY_2
        models:
          - claude-sonnet-4-6
        priority: 2

  codex:
    type: cloud
    sdk: openai
    base_url: https://api.openai.com/v1
    accounts:
      - id: codex_main
        env_key: OPENAI_API_KEY
        models:
          - gpt-4o
          - gpt-4o-mini
          - o1-preview
        priority: 1
      - id: codex_backup
        env_key: OPENAI_API_KEY_2
        models:
          - gpt-4o-mini
        priority: 2
      - id: codex_oauth
        credential_mode: codex_oauth
        models:
          - gpt-4o
          - gpt-4o-mini
          - o1-preview
        priority: 3

  gemini:
    type: cloud
    sdk: google
    accounts:
      - id: gemini_main
        env_key: GEMINI_API_KEY
        models:
          - gemini-2.0-pro
          - gemini-2.0-flash
        priority: 1

  deepseek:
    type: cloud
    sdk: openai_compatible
    base_url: https://api.deepseek.com
    accounts:
      - id: deepseek_main
        env_key: DEEPSEEK_API_KEY
        models:
          - deepseek-chat
          - deepseek-coder
        priority: 1

  ollama:
    type: local
    sdk: ollama
    base_url_env: OLLAMA_HOST    # qua Tailscale
    accounts:
      - id: ollama_local
        models:
          - gpt-oss-20b
          - llama3.1:70b
          - qwen2.5-coder:32b
        priority: 1

# --- Routing rules (per worker / phòng ban) ---
# Khi không có rule riêng → dùng default_chain
default_chain:
  - { provider: claude, model: claude-sonnet-4-6 }
  - { provider: codex, model: gpt-4o }
  - { provider: ollama, model: gpt-oss-20b }

routing_rules:
  # CODER department
  coder.frontend:
    - { provider: gemini, model: gemini-2.0-pro }
    - { provider: codex, model: gpt-4o }

  coder.backend:
    - { provider: codex, model: gpt-4o }
    - { provider: deepseek, model: deepseek-coder }
    - { provider: ollama, model: qwen2.5-coder:32b }

  # RESEARCH
  research.optics:
    - { provider: claude, model: claude-opus-4-6 }
    - { provider: gemini, model: gemini-2.0-pro }

  # MEDIA
  media.content:
    - { provider: claude, model: claude-sonnet-4-6 }
    - { provider: gemini, model: gemini-2.0-flash }

  media.image_maker:
    # Image generation - cần provider hỗ trợ image (placeholder)
    - { provider: gemini, model: gemini-2.0-pro }

  media.video_maker:
    - { provider: claude, model: claude-sonnet-4-6 }

  # REPORT
  report.slide_word_web:
    - { provider: claude, model: claude-sonnet-4-6 }
    - { provider: codex, model: gpt-4o }

  report.video_report:
    - { provider: claude, model: claude-sonnet-4-6 }

  # QA
  qa.qa_reviewer:
    - { provider: claude, model: claude-opus-4-6 }   # cao nhất cho QA
    - { provider: gemini, model: gemini-2.0-pro }

  # Chief of Staff (Layer 3) - quan trọng nhất
  chief_of_staff:
    - { provider: claude, model: claude-opus-4-6 }
    - { provider: codex, model: o1-preview }
    - { provider: gemini, model: gemini-2.0-pro }

# --- Optional routing profiles ---
# Enable with PROVIDER_ROUTING_PROFILE=codex_oauth.
# Useful while cloud API keys are deferred but local `codex login` is available.
routing_profiles:
  codex_oauth:
    routing_rules:
      research.optics:
        - { provider: codex, model: gpt-4o }
      media.content:
        - { provider: codex, model: gpt-4o }
      qa.qa_reviewer:
        - { provider: codex, model: gpt-4o }

# --- Quota & rotation ---
quota_management:
  check_interval_seconds: 60
  auto_rotate_on_quota_exhausted: true
  cooldown_minutes_after_quota_hit: 60
